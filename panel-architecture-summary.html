<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>面板架構總表</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #697386;
      --line: #d9deea;
      --line-strong: #9aa6bd;
      --focus: #2b64d8;
      --r: #ff6f78;
      --g: #5be768;
      --b: #7072ee;
      --y: #f7ef63;
      --c: #63e3e4;
      --m: #f062dd;
      --od: #d8a824;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 251, 0.96);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    label {
      color: #374151;
      font-size: 12px;
      font-weight: 800;
    }

    select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 9px;
      font: inherit;
    }

    main { padding: 18px; }

    .summary-grid {
      display: grid;
      grid-template-columns: minmax(520px, 1.4fr) minmax(420px, 0.92fr);
      gap: 18px;
      align-items: start;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      overflow: auto;
    }

    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 2px 10px;
      border: 1px solid #9bd9b8;
      border-radius: 999px;
      background: #e8f8ef;
      color: #0b5d3d;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 16px;
    }

    th,
    td {
      border: 1px solid var(--line);
      height: 41px;
      padding: 6px 8px;
      text-align: center;
      vertical-align: middle;
      font-weight: 500;
    }

    th {
      background: #f0f3f9;
      font-weight: 700;
    }

    .row-head {
      background: #f8fafc;
      font-weight: 700;
      width: 72px;
    }

    .phase-now {
      outline: 2px solid var(--focus);
      outline-offset: -2px;
    }

    .pix-cell {
      color: #07111f;
      font-weight: 800;
    }

    .pix-r { background: var(--r); }
    .pix-g { background: var(--g); }
    .pix-b { background: var(--b); color: #fff; }
    .pix-y { background: var(--y); }
    .pix-c { background: var(--c); }
    .pix-m { background: var(--m); }

    .od-zero {
      background: #f6f8fc;
      color: #7b8495;
      font-weight: 700;
    }

    .od-hit {
      color: #07111f;
      font-weight: 900;
    }

    .od-frame {
      box-shadow: inset 0 0 0 3px var(--od), inset 0 0 0 5px rgba(255, 255, 255, 0.45);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .swatch {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 1px solid #aeb7c8;
      border-radius: 4px;
    }

    @media (max-width: 1180px) {
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .summary-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      main { padding: 12px; }
      .section { padding: 10px; }
      table { font-size: 13px; }
      th, td { height: 34px; padding: 5px 4px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>面板架構總表</h1>
    <div class="toolbar">
      <label for="panelSelect">Panel</label>
      <select id="panelSelect"></select>
      <label for="targetSelect">Pattern</label>
      <select id="targetSelect"></select>
      <label for="phaseSelect">Line</label>
      <select id="phaseSelect"></select>
    </div>
  </header>

  <main>
    <div class="summary-grid">
      <section class="section">
        <div class="table-head">
          <h2>Panel Mapping</h2>
        </div>
        <div id="mappingTable"></div>
        <div class="legend">
          <span class="legend-item"><span class="swatch pix-r"></span>R</span>
          <span class="legend-item"><span class="swatch pix-g"></span>G</span>
          <span class="legend-item"><span class="swatch pix-b"></span>B</span>
          <span class="legend-item"><span class="swatch pix-y"></span>Y=R+G</span>
          <span class="legend-item"><span class="swatch pix-c"></span>C=G+B</span>
          <span class="legend-item"><span class="swatch pix-m"></span>M=R+B</span>
        </div>
      </section>

      <section class="section">
        <div class="table-head">
          <h2>OD Subpix Position</h2>
          <span class="badge" id="odBadge"></span>
        </div>
        <div id="odTable"></div>
      </section>
    </div>
  </main>

  <script>
    const PANELS = [
      { id: 1, name: "HKC1", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "011011", B: "100100" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "101101", B: "010010" }
      ]},
      { id: 2, name: "HKC2", phases: [
        { R: "110110", G: "001001", B: "000000" },
        { R: "000000", G: "010010", B: "101101" },
        { R: "011011", G: "100100", B: "000000" },
        { R: "000000", G: "001001", B: "110110" }
      ]},
      { id: 3, name: "HKC3", phases: [
        { R: "001001", G: "000000", B: "110110" },
        { R: "010010", G: "101101", B: "000000" },
        { R: "010010", G: "000000", B: "101101" },
        { R: "100100", G: "011011", B: "000000" }
      ]},
      { id: 4, name: "HKC4", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "101101", B: "010010" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "011011", B: "100100" }
      ]},
      { id: 5, name: "HKC5", phases: [
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "011011", B: "100100" },
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "101101", B: "010010" }
      ]},
      { id: 6, name: "HKC6", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "101101", B: "010010" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "011011", B: "100100" }
      ]},
      { id: 7, name: "HKC7", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "011011", B: "100100" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "101101", B: "010010" }
      ]},
      { id: 8, name: "HKC8", phases: [
        { R: "010010", G: "101101", B: "000000" },
        { R: "010010", G: "000000", B: "101101" },
        { R: "100100", G: "011011", B: "000000" },
        { R: "001001", G: "000000", B: "110110" }
      ]},
      { id: 9, name: "CSOT1", phases: [
        { R: "001001", G: "000000", B: "110110" },
        { R: "010010", G: "101101", B: "000000" },
        { R: "010010", G: "000000", B: "101101" },
        { R: "100100", G: "011011", B: "000000" }
      ]},
      { id: 10, name: "BOE1", phases: [
        { R: "000000", G: "101101", B: "010010" },
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "011011", B: "100100" },
        { R: "110110", G: "000000", B: "001001" }
      ]},
      { id: 11, name: "BOE2", phases: [
        { R: "001001", G: "010010", B: "100100" },
        { R: "001001", G: "010010", B: "100100" },
        { R: "001001", G: "010010", B: "100100" },
        { R: "001001", G: "010010", B: "100100" }
      ]},
      { id: 12, name: "TIANMA1", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "101101", B: "010010" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "011011", B: "100100" }
      ]}
    ];

    const TARGETS = [
      { id: "R", label: "R", colors: ["R"] },
      { id: "G", label: "G", colors: ["G"] },
      { id: "B", label: "B", colors: ["B"] },
      { id: "Y", label: "Y (R+G)", colors: ["R", "G"] },
      { id: "C", label: "C (G+B)", colors: ["G", "B"] },
      { id: "M", label: "M (R+B)", colors: ["R", "B"] }
    ];

    const DISPLAY_SOURCE_MAP = {
      1: [["R1", "R2", "B1", "R3", "R4", "B3"], ["G0", "G1", "B2", "G2", "G3", "B4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G1", "B1", "G2", "G3", "B3", "G4"]],
      2: [["G0", "R1", "R2", "G2", "R3", "R4"], ["B0", "G1", "B1", "B2", "G3", "B3"], ["R1", "R2", "G2", "R3", "R4", "G4"], ["G1", "B1", "B2", "G3", "B3", "B4"]],
      3: [["R1", "B1", "B2", "R3", "B3", "B4"], ["G1", "R2", "G2", "G3", "R4", "G4"], ["B0", "R1", "B1", "B2", "R3", "B3"], ["G0", "G1", "R2", "G2", "G3", "R4"]],
      4: [["R1", "R2", "B2", "R3", "R4", "B4"], ["G1", "B1", "G2", "G3", "B3", "G4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G0", "G1", "B1", "G2", "G3", "B3"]],
      5: [["B0", "R1", "R2", "B2", "R3", "R4"], ["G0", "G1", "B1", "G2", "G3", "B3"], ["R1", "R2", "B2", "R3", "R4", "B4"], ["G1", "B1", "G2", "G3", "B3", "G4"]],
      6: [["R1", "R2", "B2", "R3", "R4", "B4"], ["G1", "B1", "G2", "G3", "B3", "G4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G0", "G1", "B1", "G2", "G3", "B3"]],
      7: [["R1", "R2", "B1", "R3", "R4", "B3"], ["G0", "G1", "B2", "G2", "G3", "B4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G1", "B1", "G2", "G3", "B3", "G4"]],
      8: [["G1", "R2", "G2", "G3", "R4", "G4"], ["B0", "R1", "B1", "B2", "R3", "B3"], ["G0", "G1", "R2", "G2", "G3", "R4"], ["R1", "B1", "B2", "R3", "B3", "B4"]],
      9: [["R1", "B1", "B2", "R3", "B3", "B4"], ["G1", "R2", "G2", "G3", "R4", "G4"], ["B0", "R1", "B1", "B2", "R3", "B3"], ["G0", "G1", "R2", "G2", "G3", "R4"]],
      10: [["G1", "B1", "G2", "G3", "B3", "G4"], ["R1", "R2", "B2", "R3", "R4", "B4"], ["G0", "G1", "B1", "G2", "G3", "B3"], ["B0", "R1", "R2", "B2", "R3", "R4"]],
      11: [["R", "G", "B", "R", "G", "B"], ["R", "G", "B", "R", "G", "B"], ["R", "G", "B", "R", "G", "B"], ["R", "G", "B", "R", "G", "B"]],
      12: [["R1", "R2", "B2", "R3", "R4", "B4"], ["G1", "B1", "G2", "G3", "B3", "G4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G0", "G1", "B1", "G2", "G3", "B3"]]
    };

    const state = { panelId: 3, target: "C", phase: 1 };
    const $ = (id) => document.getElementById(id);

    function classForColor(color) {
      return "pix-" + String(color || "").charAt(0).toLowerCase();
    }

    function phaseData(panelInfo, phase) {
      return panelInfo.phases[phase];
    }

    function colorAt(phaseInfo, opIndex) {
      return ["R", "G", "B"].find((color) => phaseInfo[color][opIndex] === "1") || "M";
    }

    function bitsToOps(bits) {
      return bits.split("").map((value) => Number(value));
    }

    function orOps(a, b) {
      return a.map((value, index) => value || b[index] ? 1 : 0);
    }

    function notOps(a) {
      return a.map((value) => value ? 0 : 1);
    }

    function andOps(a, b) {
      return a.map((value, index) => value && b[index] ? 1 : 0);
    }

    function expectedFor(panelInfo, phase, colors) {
      return [0, 1, 2, 3, 4, 5].map((opIndex) => {
        const label = sourceLabelAt(panelInfo, phase, opIndex);
        return colors.includes(label[0]) ? 1 : 0;
      });
    }

    function panel() {
      return PANELS.find((item) => item.id === state.panelId);
    }

    function target() {
      return TARGETS.find((item) => item.id === state.target);
    }

    function sourceLabelAt(panelInfo, rowIndex, opIndex) {
      const sourceMap = DISPLAY_SOURCE_MAP[panelInfo.id];
      return sourceMap ? sourceMap[rowIndex][opIndex] : colorAt(panelInfo.phases[rowIndex], opIndex);
    }

    function renderControls() {
      $("panelSelect").innerHTML = PANELS.map((item) => `<option value="${item.id}">${item.name}</option>`).join("");
      $("targetSelect").innerHTML = TARGETS.map((item) => `<option value="${item.id}">${item.label}</option>`).join("");
      $("phaseSelect").innerHTML = [0, 1, 2, 3].map((phase) => `<option value="${phase}">LINE${phase + 1}</option>`).join("");
      $("panelSelect").value = String(state.panelId);
      $("targetSelect").value = state.target;
      $("phaseSelect").value = String(state.phase);
      $("panelSelect").addEventListener("change", (event) => {
        state.panelId = Number(event.target.value);
        render();
      });
      $("targetSelect").addEventListener("change", (event) => {
        state.target = event.target.value;
        render();
      });
      $("phaseSelect").addEventListener("change", (event) => {
        state.phase = Number(event.target.value);
        render();
      });
    }

    function renderMapping() {
      const p = panel();
      const rows = p.phases.map((phase, rowIndex) => {
        const cells = [0, 1, 2, 3, 4, 5].map((opIndex) => {
          const label = sourceLabelAt(p, rowIndex, opIndex);
          const color = label[0] || colorAt(phase, opIndex);
          return `<td class="pix-cell ${classForColor(color)}">${label}</td>`;
        }).join("");
        const cls = rowIndex === state.phase ? "phase-now" : "";
        return `<tr><td class="row-head ${cls}">G${rowIndex + 1}</td>${cells}</tr>`;
      }).join("");

      $("mappingTable").innerHTML = `
        <table>
          <thead>
            <tr><th>${p.name}</th><th>OP1</th><th>OP2</th><th>OP3</th><th>OP4</th><th>OP5</th><th>OP6</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderOdTable() {
      const p = panel();
      const t = target();
      $("odBadge").textContent = "DO OD";
      const rows = [0, 1, 2, 3, 4, 5].map((opIndex) => {
        const cells = p.phases.map((phase, rowIndex) => {
          const now = expectedFor(p, rowIndex, t.colors);
          const prev = expectedFor(p, (rowIndex + 3) % 4, t.colors);
          const rising = andOps(now, notOps(prev));
          if (!now[opIndex]) {
            return `<td class="od-zero">0</td>`;
          }
          const label = sourceLabelAt(p, rowIndex, opIndex);
          const color = label[0] || colorAt(phase, opIndex);
          const frameClass = rising[opIndex] ? " od-frame" : "";
          return `<td class="pix-cell od-hit${frameClass} ${classForColor(color)}">${label}</td>`;
        }).join("");
        return `<tr><td class="row-head">D${opIndex}</td>${cells}</tr>`;
      }).join("");

      $("odTable").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>${t.id}</th>
              ${[0, 1, 2, 3].map((phase) => `<th class="${phase === state.phase ? "phase-now" : ""}">LINE${phase + 1}</th>`).join("")}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function render() {
      $("panelSelect").value = String(state.panelId);
      $("targetSelect").value = state.target;
      $("phaseSelect").value = String(state.phase);
      renderMapping();
      renderOdTable();
    }

    renderControls();
    render();
  </script>
</body>
</html>
