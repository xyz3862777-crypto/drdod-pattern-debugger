<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>&#38754;&#26495;&#26550;&#27083;&#32317;&#34920;</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #697386;
      --line: #d9deea;
      --r: #ff6f78;
      --g: #5be768;
      --b: #7072ee;
      --y: #f7ef63;
      --c: #63e3e4;
      --m: #f062dd;
      --od: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 251, 0.96);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    label {
      color: #374151;
      font-size: 12px;
      font-weight: 800;
    }

    select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 9px;
      font: inherit;
    }

    main {
      padding: 18px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .swatch {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 1px solid #aeb7c8;
      border-radius: 4px;
    }

    .panel-block {
      display: grid;
      grid-template-columns: minmax(340px, 0.32fr) minmax(810px, 1.68fr);
      gap: 12px;
      align-items: start;
      margin-bottom: 20px;
    }

    .panel-block.hidden {
      display: none;
    }

    .panel-title {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .panel-title h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 2px 10px;
      border: 1px solid #9bd9b8;
      border-radius: 999px;
      background: #e8f8ef;
      color: #0b5d3d;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .mapping-card,
    .pattern-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
      overflow: auto;
    }

    .pattern-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(126px, 1fr));
      gap: 6px;
    }

    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .table-head h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 11px;
    }

    th,
    td {
      border: 1px solid var(--line);
      height: 25px;
      padding: 2px 3px;
      text-align: center;
      vertical-align: middle;
      font-weight: 500;
    }

    th {
      background: #f0f3f9;
      font-weight: 700;
    }

    .row-head {
      background: #f8fafc;
      font-weight: 700;
      width: 42px;
    }

    .phase-now {
      outline: 0;
    }

    .pix-cell {
      color: #07111f;
      font-weight: 800;
    }

    .pix-r { background: var(--r); }
    .pix-g { background: var(--g); }
    .pix-b { background: var(--b); color: #fff; }
    .pix-y { background: var(--y); }
    .pix-c { background: var(--c); }
    .pix-m { background: var(--m); }

    .od-zero {
      background: #f6f8fc;
      color: #7b8495;
      font-weight: 700;
    }

    .od-hit {
      color: #07111f;
      font-weight: 900;
    }

    .od-frame {
      box-shadow: inset 0 0 0 3px var(--od);
    }

    @media (max-width: 1160px) {
      .panel-block { grid-template-columns: 1fr; }
      .pattern-grid { grid-template-columns: repeat(3, minmax(210px, 1fr)); }
    }

    @media (max-width: 820px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      main {
        padding: 12px;
      }

      .pattern-grid {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
    }

    @media (max-width: 560px) {
      .pattern-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>&#38754;&#26495;&#26550;&#27083;&#32317;&#34920;</h1>
    <div class="toolbar">
      <label for="panelFilter">Panel</label>
      <select id="panelFilter"></select>
      <label for="phaseSelect">Line</label>
      <select id="phaseSelect"></select>
    </div>
  </header>

  <main>
    <div class="legend">
      <span class="legend-item"><span class="swatch pix-r"></span>R</span>
      <span class="legend-item"><span class="swatch pix-g"></span>G</span>
      <span class="legend-item"><span class="swatch pix-b"></span>B</span>
      <span class="legend-item"><span class="swatch pix-y"></span>Y=R+G</span>
      <span class="legend-item"><span class="swatch pix-c"></span>C=G+B</span>
      <span class="legend-item"><span class="swatch pix-m"></span>M=R+B</span>
    </div>
    <div id="summaryRoot"></div>
  </main>

  <script>
    const PANELS = [
      { id: 1, name: "HKC1", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "011011", B: "100100" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "101101", B: "010010" }
      ]},
      { id: 2, name: "HKC2", phases: [
        { R: "110110", G: "001001", B: "000000" },
        { R: "000000", G: "010010", B: "101101" },
        { R: "011011", G: "100100", B: "000000" },
        { R: "000000", G: "001001", B: "110110" }
      ]},
      { id: 3, name: "HKC3", phases: [
        { R: "001001", G: "000000", B: "110110" },
        { R: "010010", G: "101101", B: "000000" },
        { R: "010010", G: "000000", B: "101101" },
        { R: "100100", G: "011011", B: "000000" }
      ]},
      { id: 4, name: "HKC4", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "101101", B: "010010" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "011011", B: "100100" }
      ]},
      { id: 5, name: "HKC5", phases: [
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "011011", B: "100100" },
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "101101", B: "010010" }
      ]},
      { id: 6, name: "HKC6", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "101101", B: "010010" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "011011", B: "100100" }
      ]},
      { id: 7, name: "HKC7", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "011011", B: "100100" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "101101", B: "010010" }
      ]},
      { id: 8, name: "HKC8", phases: [
        { R: "010010", G: "101101", B: "000000" },
        { R: "010010", G: "000000", B: "101101" },
        { R: "100100", G: "011011", B: "000000" },
        { R: "001001", G: "000000", B: "110110" }
      ]},
      { id: 9, name: "CSOT1", phases: [
        { R: "001001", G: "000000", B: "110110" },
        { R: "010010", G: "101101", B: "000000" },
        { R: "010010", G: "000000", B: "101101" },
        { R: "100100", G: "011011", B: "000000" }
      ]},
      { id: 10, name: "BOE1", phases: [
        { R: "000000", G: "101101", B: "010010" },
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "011011", B: "100100" },
        { R: "110110", G: "000000", B: "001001" }
      ]},
      { id: 11, name: "BOE2", phases: [
        { R: "001001", G: "010010", B: "100100" },
        { R: "001001", G: "010010", B: "100100" },
        { R: "001001", G: "010010", B: "100100" },
        { R: "001001", G: "010010", B: "100100" }
      ]},
      { id: 12, name: "TIANMA1", phases: [
        { R: "011011", G: "000000", B: "100100" },
        { R: "000000", G: "101101", B: "010010" },
        { R: "110110", G: "000000", B: "001001" },
        { R: "000000", G: "011011", B: "100100" }
      ]}
    ];

    const TARGETS = [
      { id: "R", label: "R", colors: ["R"] },
      { id: "G", label: "G", colors: ["G"] },
      { id: "B", label: "B", colors: ["B"] },
      { id: "Y", label: "Y (R+G)", colors: ["R", "G"] },
      { id: "M", label: "M (R+B)", colors: ["R", "B"] },
      { id: "C", label: "C (G+B)", colors: ["G", "B"] }
    ];

    const DISPLAY_SOURCE_MAP = {
      1: [["R1", "R2", "B1", "R3", "R4", "B3"], ["G0", "G1", "B2", "G2", "G3", "B4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G1", "B1", "G2", "G3", "B3", "G4"]],
      2: [["G0", "R1", "R2", "G2", "R3", "R4"], ["B0", "G1", "B1", "B2", "G3", "B3"], ["R1", "R2", "G2", "R3", "R4", "G4"], ["G1", "B1", "B2", "G3", "B3", "B4"]],
      3: [["R1", "B1", "B2", "R3", "B3", "B4"], ["G1", "R2", "G2", "G3", "R4", "G4"], ["B0", "R1", "B1", "B2", "R3", "B3"], ["G0", "G1", "R2", "G2", "G3", "R4"]],
      4: [["R1", "R2", "B2", "R3", "R4", "B4"], ["G1", "B1", "G2", "G3", "B3", "G4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G0", "G1", "B1", "G2", "G3", "B3"]],
      5: [["B0", "R1", "R2", "B2", "R3", "R4"], ["G0", "G1", "B1", "G2", "G3", "B3"], ["R1", "R2", "B2", "R3", "R4", "B4"], ["G1", "B1", "G2", "G3", "B3", "G4"]],
      6: [["R1", "R2", "B2", "R3", "R4", "B4"], ["G1", "B1", "G2", "G3", "B3", "G4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G0", "G1", "B1", "G2", "G3", "B3"]],
      7: [["R1", "R2", "B1", "R3", "R4", "B3"], ["G0", "G1", "B2", "G2", "G3", "B4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G1", "B1", "G2", "G3", "B3", "G4"]],
      8: [["G1", "R2", "G2", "G3", "R4", "G4"], ["B0", "R1", "B1", "B2", "R3", "B3"], ["G0", "G1", "R2", "G2", "G3", "R4"], ["R1", "B1", "B2", "R3", "B3", "B4"]],
      9: [["R1", "B1", "B2", "R3", "B3", "B4"], ["G1", "R2", "G2", "G3", "R4", "G4"], ["B0", "R1", "B1", "B2", "R3", "B3"], ["G0", "G1", "R2", "G2", "G3", "R4"]],
      10: [["G1", "B1", "G2", "G3", "B3", "G4"], ["R1", "R2", "B2", "R3", "R4", "B4"], ["G0", "G1", "B1", "G2", "G3", "B3"], ["B0", "R1", "R2", "B2", "R3", "R4"]],
      11: [["R", "G", "B", "R", "G", "B"], ["R", "G", "B", "R", "G", "B"], ["R", "G", "B", "R", "G", "B"], ["R", "G", "B", "R", "G", "B"]],
      12: [["R1", "R2", "B2", "R3", "R4", "B4"], ["G1", "B1", "G2", "G3", "B3", "G4"], ["B0", "R1", "R2", "B2", "R3", "R4"], ["G0", "G1", "B1", "G2", "G3", "B3"]]
    };

    const PANEL_GROUPS = [
      { id: "HKC1_HKC7", name: "HKC1 / HKC7", panelId: 1 },
      { id: "HKC2", name: "HKC2", panelId: 2 },
      { id: "HKC3_CSOT1", name: "HKC3 / CSOT1", panelId: 3 },
      { id: "HKC4_HKC6_TIANMA1", name: "HKC4 / HKC6 / TIANMA1", panelId: 4 },
      { id: "HKC5", name: "HKC5", panelId: 5 },
      { id: "HKC8", name: "HKC8", panelId: 8 },
      { id: "BOE1", name: "BOE1", panelId: 10 },
      { id: "BOE2", name: "BOE2 (不須DRDOD)", panelId: 11, drdod: false }
    ];

    const state = {
      panelFilter: "ALL",
      phase: 1
    };

    const $ = (id) => document.getElementById(id);

    function classForColor(color) {
      return "pix-" + String(color || "").charAt(0).toLowerCase();
    }

    function colorAt(phaseInfo, opIndex) {
      return ["R", "G", "B"].find((color) => phaseInfo[color][opIndex] === "1") || "M";
    }

    function notOps(a) {
      return a.map((value) => value ? 0 : 1);
    }

    function andOps(a, b) {
      return a.map((value, index) => value && b[index] ? 1 : 0);
    }

    function sourceLabelAt(panelInfo, rowIndex, opIndex) {
      const sourceMap = DISPLAY_SOURCE_MAP[panelInfo.id];
      return sourceMap ? sourceMap[rowIndex][opIndex] : colorAt(panelInfo.phases[rowIndex], opIndex);
    }

    function panelById(panelId) {
      return PANELS.find((item) => item.id === panelId);
    }

    function expectedFor(panelInfo, phase, colors) {
      return [0, 1, 2, 3, 4, 5].map((opIndex) => {
        const label = sourceLabelAt(panelInfo, phase, opIndex);
        return colors.includes(label[0]) ? 1 : 0;
      });
    }

    function renderControls() {
      $("panelFilter").innerHTML = [
        `<option value="ALL">ALL PANEL TYPE</option>`,
        ...PANEL_GROUPS.map((item) => `<option value="${item.id}">${item.name}</option>`)
      ].join("");
      $("phaseSelect").innerHTML = [0, 1, 2, 3].map((phase) => `<option value="${phase}">LINE${phase + 1}</option>`).join("");
      $("panelFilter").value = state.panelFilter;
      $("phaseSelect").value = String(state.phase);
      $("panelFilter").addEventListener("change", (event) => {
        state.panelFilter = event.target.value;
        renderVisibility();
      });
      $("phaseSelect").addEventListener("change", (event) => {
        state.phase = Number(event.target.value);
        render();
      });
    }

    function renderMapping(panelInfo) {
      const rows = panelInfo.phases.map((phase, rowIndex) => {
        const cells = [0, 1, 2, 3, 4, 5].map((opIndex) => {
          const label = sourceLabelAt(panelInfo, rowIndex, opIndex);
          const color = label[0] || colorAt(phase, opIndex);
          return `<td class="pix-cell ${classForColor(color)}">${label}</td>`;
        }).join("");
        const cls = rowIndex === state.phase ? "phase-now" : "";
        return `<tr><td class="row-head ${cls}">G${rowIndex + 1}</td>${cells}</tr>`;
      }).join("");

      return `
        <table>
          <thead>
            <tr><th>${panelInfo.name}</th><th>OP1</th><th>OP2</th><th>OP3</th><th>OP4</th><th>OP5</th><th>OP6</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderOdTable(panelInfo, targetInfo) {
      const rows = [0, 1, 2, 3, 4, 5].map((opIndex) => {
        const cells = panelInfo.phases.map((phase, rowIndex) => {
          const now = expectedFor(panelInfo, rowIndex, targetInfo.colors);
          const prev = expectedFor(panelInfo, (rowIndex + 3) % 4, targetInfo.colors);
          const rising = andOps(now, notOps(prev));
          if (!now[opIndex]) {
            return `<td class="od-zero">0</td>`;
          }
          const label = sourceLabelAt(panelInfo, rowIndex, opIndex);
          const color = label[0] || colorAt(phase, opIndex);
          const frameClass = rising[opIndex] ? " od-frame" : "";
          return `<td class="pix-cell od-hit${frameClass} ${classForColor(color)}">${label}</td>`;
        }).join("");
        return `<tr><td class="row-head">D${opIndex}</td>${cells}</tr>`;
      }).join("");

      return `
        <table>
          <thead>
            <tr>
              <th>${targetInfo.id}</th>
              ${[0, 1, 2, 3].map((phase) => `<th class="${phase === state.phase ? "phase-now" : ""}">LINE${phase + 1}</th>`).join("")}
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderPanelBlock(panelGroup) {
      const panelInfo = panelById(panelGroup.panelId);
      const patterns = TARGETS.map((targetInfo) => `
        <section class="pattern-card">
          <div class="table-head">
            <h3>${targetInfo.label}</h3>
            <span class="badge">${panelGroup.drdod === false ? "NO DRDOD" : "DO OD"}</span>
          </div>
          ${renderOdTable(panelInfo, targetInfo)}
        </section>
      `).join("");

      return `
        <article class="panel-block" data-panel-id="${panelGroup.id}">
          <div class="panel-title">
            <h2>${panelGroup.name}</h2>
            <span class="badge">R / G / B / Y / M / C</span>
          </div>
          <section class="mapping-card">
            <div class="table-head"><h3>Panel Mapping</h3></div>
            ${renderMapping(panelInfo)}
          </section>
          <div class="pattern-grid">${patterns}</div>
        </article>
      `;
    }

    function renderVisibility() {
      document.querySelectorAll(".panel-block").forEach((block) => {
        const visible = state.panelFilter === "ALL" || block.dataset.panelId === state.panelFilter;
        block.classList.toggle("hidden", !visible);
      });
    }

    function render() {
      $("panelFilter").value = state.panelFilter;
      $("phaseSelect").value = String(state.phase);
      $("summaryRoot").innerHTML = PANEL_GROUPS.map(renderPanelBlock).join("");
      renderVisibility();
    }

    renderControls();
    render();
  </script>
</body>
</html>
